<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2rem 1.5rem 4rem;
    font-family: "Outfit", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: hsl(220 20% 97%); color: hsl(220 20% 10%);
  }
  @media (prefers-color-scheme: dark) {
    body { background: hsl(220 20% 8%); color: hsl(220 10% 95%); }
    .card { background: hsl(220 20% 12%); border-color: hsl(220 15% 22%); }
    figcaption { color: hsl(220 10% 70%); }

  h1 { font-size: 1.6rem; margin: 0 0 .25rem; letter-spacing: -0.01em; }

  .meta a { color: hsl(220 70% 50%); text-decoration: none; margin-right: 1rem; font-size: .9rem; }

  .grid {
    max-width: 1200px; margin: 0 auto;
    display: grid; gap: 1.25rem;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
  .card {
    background: #fff; border: 1px solid hsl(220 15% 88%); border-radius: 12px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .frame {
    background: hsl(220 20% 94%); display: flex; align-items: flex-start;
    justify-content: center; padding: .75rem; max-height: 460px; overflow: hidden;
  }
  .frame img { width: 100%; height: auto; border-radius: 6px; display: block; }
  figcaption { padding: .6rem .8rem; font-size: .85rem; font-weight: 600; }
  figcaption .n { color: hsl(220 10% 55%); font-weight: 400; margin-right: .4rem; }
  .wide { grid-column: span 2; }
  .wide .frame { max-height: 520px; }
</style>
