name: Bug report
description: Report something that is broken
labels: ["type: bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. The in-app reporter (Settings → Report a Bug)
        fills most of this in for you and attaches sanitized diagnostics — use
        it where possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See ...
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What you expected to happen, and what actually happened.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: App version, device, browser. The in-app reporter attaches this automatically.
    validations:
      required: false
