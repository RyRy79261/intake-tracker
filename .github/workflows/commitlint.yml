name: PR title

# PR title validation (P1 #11).
#
# The local husky commit-msg hook (commitlint.config.js extends
# @commitlint/config-conventional) only catches non-conventional commit
# messages on the developer's machine. Squash-merge throws all those
# commit messages away in favour of the PR title — so any PR title that
# doesn't match the conventional shape would silently land on main and
# break release-please's changelog generation.
#
# amannn/action-semantic-pull-request validates the PR title itself
# (not the individual commits) using the same Conventional Commits
# vocabulary that commitlint.config.js enforces locally.

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Mirror the @commitlint/config-conventional defaults.
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            test
            build
            ci
            revert
            style
          # Allow empty scope; when present require lowercase.
          requireScope: false
          # Subject must start lowercase (case-conventional default).
          subjectPattern: ^(?![A-Z]).+
          subjectPatternError: |
            The subject "{subject}" found in the PR title "{title}"
            didn't match the configured pattern. Please ensure that the
            subject doesn't start with an uppercase character.
