name: Android Release

on:
  release:
    types: [published]
  # Allow manual runs: pass an existing tag to (re)build it, or leave blank to
  # build the branch the workflow is dispatched from (useful for validating
  # pipeline changes before cutting a release).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build, e.g. v1.28.0 (blank = current branch)"
        required: false
        type: string
  # Called by release-please.yml right after it publishes a release. A release
  # created with the default GITHUB_TOKEN does NOT fire the `release` event (its
  # loop-prevention), so `on: release` never runs for release-please releases.
  # Invoking this as a reusable workflow in release-please's own run builds and
  # attaches the APK without needing a PAT.
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build and attach the APK + AAB to"
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Default Play track; override by setting a repository variable PLAY_TRACK
      # to one of: internal | alpha (closed testing) | beta (open testing) | production
      PLAY_TRACK: ${{ vars.PLAY_TRACK || 'beta' }}
      PACKAGE_NAME: dev.ryanjnoble.intaketracker
    steps:
      - uses: actions/checkout@v6
        with:
          # `inputs.tag` covers both workflow_dispatch and workflow_call; falls
          # back to the release tag, then to the dispatched branch.
          ref: ${{ inputs.tag || github.event.release.tag_name || github.ref_name }}

      # Resolve the release tag (if any) once. Non-empty for: release events,
      # workflow_call from release-please, and workflow_dispatch given a tag.
      # Empty for a bare branch dispatch (build-only validation, no attach).
      - name: Resolve release tag
        id: tag
        run: echo "name=${{ inputs.tag || github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Generate versionCode from semver: major*10000 + minor*100 + patch
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      # cap-build.js writes android/app/version.properties from the root
      # package.json version, builds the static export (apps/web/out), and runs
      # from apps/web (where next.config.mjs + the Capacitor CLI/plugins live).
      - name: Build Capacitor static export
        working-directory: apps/web
        run: node scripts/cap-build.js
        env:
          NEXT_PUBLIC_API_BASE_URL: https://intake-tracker.ryanjnoble.dev

      # capacitor.config.ts lives in apps/web with `android.path: ../../android`,
      # so cap (run here) discovers plugins from apps/web/package.json and syncs
      # the export into the root android/ project.
      - name: Sync web assets to Android
        working-directory: apps/web
        run: npx cap sync android

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Decode upload keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set — cannot produce a signed release. See docs/android-release.md"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          echo "path=$RUNNER_TEMP/upload-keystore.jks" >> "$GITHUB_OUTPUT"

      - name: Build signed AAB and APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ steps.keystore.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Rename artifacts
        id: artifacts
        run: |
          VERSION=${{ steps.version.outputs.version }}
          AAB_SRC=android/app/build/outputs/bundle/release/app-release.aab
          APK_SRC=android/app/build/outputs/apk/release/app-release.apk
          AAB_OUT="android/app/build/outputs/bundle/release/intake-tracker-v${VERSION}.aab"
          APK_OUT="android/app/build/outputs/apk/release/intake-tracker-v${VERSION}.apk"
          mv "$AAB_SRC" "$AAB_OUT"
          mv "$APK_SRC" "$APK_OUT"
          echo "aab=$AAB_OUT" >> "$GITHUB_OUTPUT"
          echo "apk=$APK_OUT" >> "$GITHUB_OUTPUT"

      # Always expose the signed APK as a run artifact — gives an installable
      # build to download from any run (incl. workflow_dispatch on a branch),
      # not just published releases.
      - name: Upload signed APK as run artifact
        uses: actions/upload-artifact@v4
        with:
          name: intake-tracker-apk-v${{ steps.version.outputs.version }}
          path: ${{ steps.artifacts.outputs.apk }}
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        if: steps.tag.outputs.name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            ${{ steps.artifacts.outputs.aab }}
            ${{ steps.artifacts.outputs.apk }}

      # ---------------------------------------------------------------------
      # Upload the signed AAB to Google Play.
      #
      # Requires the PLAY_SERVICE_ACCOUNT_JSON secret (a Google Cloud
      # service-account key with the Play Developer API enabled and access
      # granted in the Play Console). The step is skipped if the secret is
      # absent, so the GitHub release still succeeds before Play is wired up.
      #
      # NOTE: the FIRST release of a brand-new app must be uploaded manually
      # in the Play Console — the API cannot create the app listing. Every
      # release after that one is automated by this step.
      # ---------------------------------------------------------------------
      - name: Check Play credentials
        id: play
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PLAY_SERVICE_ACCOUNT_JSON not set — skipping Play upload. See docs/android-release.md"
          fi

      - name: Upload to Google Play (${{ env.PLAY_TRACK }})
        if: steps.play.outputs.enabled == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: ${{ steps.artifacts.outputs.aab }}
          track: ${{ env.PLAY_TRACK }}
          status: completed
