name: Android Release

on:
  release:
    types: [published]
  # Allow manual re-runs (e.g. to retry a Play upload) against an existing tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build, e.g. v1.28.0"
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Default Play track; override by setting a repository variable PLAY_TRACK
      # to one of: internal | alpha (closed testing) | beta (open testing) | production
      PLAY_TRACK: ${{ vars.PLAY_TRACK || 'beta' }}
      PACKAGE_NAME: dev.ryanjnoble.intaketracker
    steps:
      # Validate the checkout ref. For manual runs, the user-supplied `tag` input
      # is otherwise passed straight to actions/checkout — without this gate a
      # manual run could build+sign+upload an arbitrary branch or SHA. We require
      # the input to resolve to an existing `refs/tags/<tag>` and fail otherwise.
      - name: Resolve and validate checkout ref
        id: ref
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            REF="$RELEASE_TAG"
          else
            REF="$INPUT_TAG"
          fi
          if [ -z "$REF" ]; then
            echo "::error::No tag could be determined for this run."
            exit 1
          fi
          # Verify the tag actually exists in this repo. `gh api` exits non-zero
          # (404) for an unknown tag, which fails the job before any build/sign.
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${REF}" >/dev/null 2>&1; then
            echo "::error::Tag '${REF}' does not exist (refs/tags/${REF} not found). Refusing to build."
            exit 1
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Generate versionCode from semver: major*10000 + minor*100 + patch
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Write version.properties for Gradle
        run: |
          cat > android/app/version.properties <<EOF
          VERSION_CODE=${{ steps.version.outputs.version_code }}
          VERSION_NAME=${{ steps.version.outputs.version }}
          EOF

      - name: Build Capacitor static export
        run: node scripts/cap-build.js
        env:
          NEXT_PUBLIC_API_BASE_URL: https://intake-tracker.ryanjnoble.dev

      - name: Sync web assets to Android
        run: npx cap sync android

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Decode upload keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Fail fast if ANY signing secret is missing — a partial set would
          # produce an unsigned/unusable release that silently fails downstream.
          missing=""
          for var in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              missing="${missing} ${var}"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required signing secret(s):${missing} — cannot produce a signed release. See docs/android-release.md"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          echo "path=$RUNNER_TEMP/upload-keystore.jks" >> "$GITHUB_OUTPUT"

      - name: Build signed AAB and APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ steps.keystore.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Rename artifacts
        id: artifacts
        run: |
          VERSION=${{ steps.version.outputs.version }}
          AAB_SRC=android/app/build/outputs/bundle/release/app-release.aab
          APK_SRC=android/app/build/outputs/apk/release/app-release.apk
          AAB_OUT="android/app/build/outputs/bundle/release/intake-tracker-v${VERSION}.aab"
          APK_OUT="android/app/build/outputs/apk/release/intake-tracker-v${VERSION}.apk"
          mv "$AAB_SRC" "$AAB_OUT"
          mv "$APK_SRC" "$APK_OUT"
          echo "aab=$AAB_OUT" >> "$GITHUB_OUTPUT"
          echo "apk=$APK_OUT" >> "$GITHUB_OUTPUT"

      - name: Attach artifacts to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ${{ steps.artifacts.outputs.aab }}
            ${{ steps.artifacts.outputs.apk }}

      # ---------------------------------------------------------------------
      # Upload the signed AAB to Google Play.
      #
      # Requires the PLAY_SERVICE_ACCOUNT_JSON secret (a Google Cloud
      # service-account key with the Play Developer API enabled and access
      # granted in the Play Console). The step is skipped if the secret is
      # absent, so the GitHub release still succeeds before Play is wired up.
      #
      # NOTE: the FIRST release of a brand-new app must be uploaded manually
      # in the Play Console — the API cannot create the app listing. Every
      # release after that one is automated by this step.
      # ---------------------------------------------------------------------
      - name: Check Play credentials
        id: play
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PLAY_SERVICE_ACCOUNT_JSON not set — skipping Play upload. See docs/android-release.md"
          fi

      - name: Upload to Google Play (${{ env.PLAY_TRACK }})
        if: steps.play.outputs.enabled == 'true'
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: ${{ steps.artifacts.outputs.aab }}
          track: ${{ env.PLAY_TRACK }}
          status: completed
