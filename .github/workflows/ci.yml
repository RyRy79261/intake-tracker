name: CI

on:
  pull_request:
    branches: [main, staging]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      bench: ${{ steps.filter.outputs.bench }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'e2e/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vitest.config.ts'
              - 'playwright.config.ts'
              - 'tsconfig.json'
              - 'next.config.*'
              - '.github/**'
            bench:
              - 'src/lib/db.ts'
              - 'src/__tests__/migration/**'
              - 'src/__tests__/integrity/**'
              - 'src/lib/backup-service.ts'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test-tz-sa:
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run tests (Africa/Johannesburg)
        run: pnpm test:tz:sa

  test-tz-de:
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run tests (Europe/Berlin)
        run: pnpm test:tz:de

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - name: Build production bundle
        run: pnpm build
      - name: Bundle security scan
        run: pnpm exec vitest run src/__tests__/bundle-security.test.ts

  data-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Schema consistency & backup integrity
        run: pnpm exec vitest run src/__tests__/integrity/

  e2e:
    # Phase 41: Privy is fully removed. Auth is Neon Auth (cookie session).
    # E2E tests use Playwright globalSetup to seed a session via Neon Auth.
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      # Phase 41 (D-15): per-run isolated Neon test branch so each E2E run
      # gets a fresh database. The seed step creates the test user, the
      # run step exercises the real auth flow via globalSetup, and the
      # delete step always runs to keep branch usage bounded.
      - name: Create Neon test branch
        id: neon-branch
        uses: neondatabase/create-branch-action@v5
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: ci-e2e-${{ github.run_id }}
      - name: Seed Neon Auth test user
        env:
          NEON_AUTH_BASE_URL: http://localhost:3000
          NEON_AUTH_TEST_EMAIL: ${{ secrets.NEON_AUTH_TEST_EMAIL }}
          NEON_AUTH_TEST_PASSWORD: ${{ secrets.NEON_AUTH_TEST_PASSWORD }}
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
          ALLOWED_EMAILS: ${{ secrets.NEON_AUTH_TEST_EMAIL }}
        run: pnpm tsx scripts/seed-e2e-user.ts
      - name: Run E2E tests
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:3000
          NEON_AUTH_BASE_URL: http://localhost:3000
          NEON_AUTH_COOKIE_SECRET: ${{ secrets.NEON_AUTH_COOKIE_SECRET }}
          NEON_AUTH_TEST_EMAIL: ${{ secrets.NEON_AUTH_TEST_EMAIL }}
          NEON_AUTH_TEST_PASSWORD: ${{ secrets.NEON_AUTH_TEST_PASSWORD }}
          ALLOWED_EMAILS: ${{ secrets.NEON_AUTH_TEST_EMAIL }}
        run: pnpm test:e2e
      - name: Delete Neon test branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: ci-e2e-${{ github.run_id }}
      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Verify supply chain config
        run: |
          echo "Checking pnpm-workspace.yaml for required security settings..."
          missing=0
          for setting in minimumReleaseAge trustPolicy blockExoticSubdeps auditLevel; do
            if ! grep -q "^${setting}:" pnpm-workspace.yaml; then
              echo "::error::Missing required security setting: ${setting} in pnpm-workspace.yaml"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Add the missing settings to pnpm-workspace.yaml. See Phase 23 docs."
            exit 1
          fi
          echo "All supply chain settings present"
      - name: Audit dependencies
        run: |
          # --ignore flags mirror auditConfig.ignoreCves in pnpm-workspace.yaml
          # Required because pnpm 10.30 does not read ignoreCves from workspace config
          pnpm audit --audit-level high \
            --ignore GHSA-h25m-26qc-wcjf \
            --ignore GHSA-mw96-cpmx-2vgc \
            --ignore GHSA-3ppc-4f35-3m26 \
            --ignore GHSA-7r86-cg39-jmmj \
            --ignore GHSA-23c5-xmqv-rm74 \
            --ignore GHSA-c2c7-rcm5-vvqj

  coverage:
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run coverage
        run: pnpm test:coverage
      - name: Report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          file-coverage-mode: none

  benchmark:
    needs: [changes]
    if: needs.changes.outputs.bench == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run benchmarks
        run: pnpm bench --run --compare benchmarks/results.json

  ci-pass:
    if: always()
    needs: [changes, lint, typecheck, test-tz-sa, test-tz-de, build, data-integrity, e2e, supply-chain, coverage, benchmark]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          echo "=== Unconditional jobs ==="
          echo "changes: ${{ needs.changes.result }}"
          echo "lint: ${{ needs.lint.result }}"
          echo "typecheck: ${{ needs.typecheck.result }}"
          echo "build: ${{ needs.build.result }}"
          echo "data-integrity: ${{ needs.data-integrity.result }}"
          echo "supply-chain: ${{ needs.supply-chain.result }}"

          # Unconditional jobs: must succeed
          if [[ "${{ needs.changes.result }}" != "success" ||
                "${{ needs.lint.result }}" != "success" ||
                "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.build.result }}" != "success" ||
                "${{ needs.data-integrity.result }}" != "success" ||
                "${{ needs.supply-chain.result }}" != "success" ]]; then
            echo "::error::Unconditional job failed"
            exit 1
          fi

          echo "=== Gated jobs (success or skipped) ==="
          echo "test-tz-sa: ${{ needs.test-tz-sa.result }}"
          echo "test-tz-de: ${{ needs.test-tz-de.result }}"
          echo "e2e: ${{ needs.e2e.result }}"
          echo "coverage: ${{ needs.coverage.result }}"
          echo "benchmark: ${{ needs.benchmark.result }}"

          # Gated jobs: success OR skipped
          for result in \
            "${{ needs.test-tz-sa.result }}" \
            "${{ needs.test-tz-de.result }}" \
            "${{ needs.e2e.result }}" \
            "${{ needs.coverage.result }}" \
            "${{ needs.benchmark.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Gated job failed (not success or skipped): $result"
              exit 1
            fi
          done

          echo "All jobs passed"
