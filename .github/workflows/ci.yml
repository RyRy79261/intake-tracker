name: CI

on:
  pull_request:
    # Runs on PRs to main/staging AND to the stacked Turborepo migration branches
    # so each phase in the stack is validated. The migration-branch trigger is
    # temporary — drop it once the stack lands on main.
    branches:
      - main
      - staging
      - "refactor/turborepo-monorepo-plan**"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      bench: ${{ steps.filter.outputs.bench }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - '.github/**'
            bench:
              - 'apps/web/src/lib/db.ts'
              - 'apps/web/src/__tests__/migration/**'
              - 'apps/web/src/__tests__/integrity/**'
              - 'apps/web/src/lib/backup-service.ts'

  # Supply-chain gate. Runs *before* every job that installs or executes
  # dependency code (they all `needs: [security]`), so a known-malicious or
  # vulnerable dependency change — or a secret committed into the diff — stops
  # the run before any project code executes. These steps analyse PR
  # metadata/diff only and never run the project's dependencies, so they are
  # safe to run first.
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # EDR-style monitoring of the runner's network egress + file/process
      # activity. Kept in `audit` mode for now (observe + report, don't block).
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks can scan the PR's commit range.
          fetch-depth: 0
      # Fail the PR if it introduces a dependency carrying a known-malware or
      # high/critical advisory. allow-ghsas mirrors the accepted-risk advisories
      # documented in pnpm-workspace.yaml (auditConfig.ignoreCves).
      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          license-check: false
          allow-ghsas: GHSA-h25m-26qc-wcjf,GHSA-mw96-cpmx-2vgc,GHSA-3ppc-4f35-3m26,GHSA-7r86-cg39-jmmj,GHSA-23c5-xmqv-rm74,GHSA-c2c7-rcm5-vvqj
      # Catch secrets accidentally committed in the diff.
      - name: Scan diff for committed secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # The e2e and schema-migration jobs create an ephemeral Neon branch and
  # therefore need NEON_API_KEY. Probe for it here so those jobs gate on the
  # secret's availability (present on human PRs, absent on Dependabot).
  secrets-check:
    runs-on: ubuntu-latest
    outputs:
      neon: ${{ steps.check.outputs.neon }}
    steps:
      - id: check
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          if [ -n "${NEON_API_KEY}" ]; then
            echo "neon=true" >> "$GITHUB_OUTPUT"
          else
            echo "neon=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NEON_API_KEY unavailable — skipping DB-backed jobs (e2e, schema-migration)."
          fi

  lint:
    needs: [security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    needs: [security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - name: Verify drizzle migrations are up-to-date with the schema
        run: |
          pnpm db:generate
          if [ -n "$(git status --porcelain packages/db/migrations/)" ]; then
            echo "::error::Drizzle migrations are out of date. Run 'pnpm db:generate' locally and commit the result."
            git status --porcelain packages/db/migrations/
            git diff packages/db/migrations/ | head -100
            exit 1
          fi
          echo "packages/db/migrations/ is up-to-date with the schema"

  test-tz-sa:
    needs: [changes, security]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run tests (Africa/Johannesburg)
        run: pnpm --filter @intake/web test:tz:sa

  test-tz-de:
    needs: [changes, security]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run tests (Europe/Berlin)
        run: pnpm --filter @intake/web test:tz:de

  build:
    needs: [security]
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'apps/web/next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - name: Build production bundle
        run: pnpm build
      - name: Bundle security scan
        run: pnpm --filter @intake/web exec vitest run src/__tests__/bundle-security.test.ts

  data-integrity:
    needs: [security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Schema consistency & backup integrity
        run: pnpm --filter @intake/web exec vitest run src/__tests__/integrity/

  integration:
    needs: [changes, security]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run integration tests (testcontainers + Postgres)
        run: pnpm test:integration

  e2e:
    # Auth is Neon Auth (cookie session). E2E uses Playwright globalSetup to seed
    # a session via Neon Auth.
    # Full browser e2e is an ~11-min, env/timing-sensitive smoke test. During the
    # Turborepo migration it runs only on PRs that target main (the cutover) —
    # the per-phase safety net is the green core (unit, integration, build,
    # schema-migration). Drop the base_ref gate once the stack lands on main.
    needs: [changes, secrets-check, security]
    if: needs.changes.outputs.src == 'true' && needs.secrets-check.outputs.neon == 'true' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @intake/web exec playwright install chromium --with-deps
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @intake/web exec playwright install-deps chromium
      - name: Create Neon test branch
        id: neon-branch
        uses: neondatabase/create-branch-action@v5
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: ci-e2e-${{ github.run_id }}
      - name: Reset inherited schema on ephemeral branch
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
        run: pnpm --filter @intake/web exec tsx scripts/reset-ci-schema.ts
      - name: Apply Drizzle migrations to E2E branch
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
        run: pnpm db:migrate
      - name: Run E2E tests
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
          NEON_AUTH_URL: ${{ secrets.NEON_AUTH_URL }}
          NEON_AUTH_COOKIE_SECRET: ${{ secrets.NEON_AUTH_COOKIE_SECRET }}
          NEON_AUTH_TEST_EMAIL: ${{ secrets.NEON_AUTH_TEST_EMAIL }}
          NEON_AUTH_TEST_PASSWORD: ${{ secrets.NEON_AUTH_TEST_PASSWORD }}
          ALLOWED_EMAILS: ${{ secrets.NEON_AUTH_TEST_EMAIL }}
          ENABLE_E2E_TEST_ROUTES: "true"
        run: pnpm test:e2e
      - name: Delete Neon test branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: ci-e2e-${{ github.run_id }}
      - name: Upload test traces
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  schema-migration:
    # Apply the committed Drizzle migration SQL to a fresh ephemeral Neon branch
    # per PR run. Catches schema-vs-Postgres drift that static checks cannot.
    needs: [secrets-check, security]
    if: needs.secrets-check.outputs.neon == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Create Neon test branch
        id: neon-branch
        uses: neondatabase/create-branch-action@v5
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: ci-schema-${{ github.run_id }}
      - name: Reset inherited schema on ephemeral branch
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
        run: pnpm --filter @intake/web exec tsx scripts/reset-ci-schema.ts
      - name: Apply Drizzle migrations
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
        run: pnpm db:migrate
      - name: Verify schema shape
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
        run: pnpm --filter @intake/web exec tsx scripts/verify-schema.ts
      - name: Delete Neon test branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: ci-schema-${{ github.run_id }}

  supply-chain:
    needs: [security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Verify supply chain config
        run: |
          echo "Checking pnpm-workspace.yaml for required security settings..."
          missing=0
          for setting in minimumReleaseAge trustPolicy blockExoticSubdeps auditLevel; do
            if ! grep -q "^${setting}:" pnpm-workspace.yaml; then
              echo "::error::Missing required security setting: ${setting} in pnpm-workspace.yaml"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Add the missing settings to pnpm-workspace.yaml. See Phase 23 docs."
            exit 1
          fi
          echo "All supply chain settings present"
      - name: Audit dependencies
        run: |
          pnpm audit --audit-level high \
            --ignore GHSA-h25m-26qc-wcjf \
            --ignore GHSA-mw96-cpmx-2vgc \
            --ignore GHSA-3ppc-4f35-3m26 \
            --ignore GHSA-7r86-cg39-jmmj \
            --ignore GHSA-23c5-xmqv-rm74 \
            --ignore GHSA-c2c7-rcm5-vvqj

  coverage:
    needs: [changes, security]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run coverage
        run: pnpm test:coverage
      - name: Report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: apps/web
          file-coverage-mode: none

  benchmark:
    needs: [changes, security]
    if: needs.changes.outputs.bench == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run benchmarks
        run: pnpm --filter @intake/web exec vitest bench --run --compare benchmarks/results.json

  ci-pass:
    if: always()
    needs: [changes, secrets-check, security, lint, typecheck, test-tz-sa, test-tz-de, build, data-integrity, integration, e2e, schema-migration, supply-chain, coverage, benchmark]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          echo "=== Unconditional jobs ==="
          echo "changes: ${{ needs.changes.result }}"
          echo "secrets-check: ${{ needs.secrets-check.result }}"
          echo "security: ${{ needs.security.result }}"
          echo "lint: ${{ needs.lint.result }}"
          echo "typecheck: ${{ needs.typecheck.result }}"
          echo "build: ${{ needs.build.result }}"
          echo "data-integrity: ${{ needs.data-integrity.result }}"
          echo "supply-chain: ${{ needs.supply-chain.result }}"

          if [[ "${{ needs.changes.result }}" != "success" ||
                "${{ needs.secrets-check.result }}" != "success" ||
                "${{ needs.security.result }}" != "success" ||
                "${{ needs.lint.result }}" != "success" ||
                "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.build.result }}" != "success" ||
                "${{ needs.data-integrity.result }}" != "success" ||
                "${{ needs.supply-chain.result }}" != "success" ]]; then
            echo "::error::Unconditional job failed"
            exit 1
          fi

          echo "=== Gated jobs (success or skipped) ==="
          echo "test-tz-sa: ${{ needs.test-tz-sa.result }}"
          echo "test-tz-de: ${{ needs.test-tz-de.result }}"
          echo "integration: ${{ needs.integration.result }}"
          echo "e2e: ${{ needs.e2e.result }}"
          echo "schema-migration: ${{ needs.schema-migration.result }}"
          echo "coverage: ${{ needs.coverage.result }}"
          echo "benchmark: ${{ needs.benchmark.result }}"

          for result in \
            "${{ needs.test-tz-sa.result }}" \
            "${{ needs.test-tz-de.result }}" \
            "${{ needs.integration.result }}" \
            "${{ needs.e2e.result }}" \
            "${{ needs.schema-migration.result }}" \
            "${{ needs.coverage.result }}" \
            "${{ needs.benchmark.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Gated job failed (not success or skipped): $result"
              exit 1
            fi
          done

          echo "All jobs passed"
