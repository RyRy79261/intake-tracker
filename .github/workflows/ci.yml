name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test-tz-sa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run tests (Africa/Johannesburg)
        run: pnpm test:tz:sa

  test-tz-de:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run tests (Europe/Berlin)
        run: pnpm test:tz:de

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build production bundle
        run: pnpm build
      - name: Bundle security scan
        run: pnpm exec vitest run src/__tests__/bundle-security.test.ts

  data-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Schema consistency & backup integrity
        run: pnpm exec vitest run src/__tests__/integrity/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        run: pnpm test:e2e
      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Verify supply chain config
        run: |
          echo "Checking pnpm-workspace.yaml for required security settings..."
          missing=0
          for setting in minimumReleaseAge trustPolicy blockExoticSubdeps; do
            if ! grep -q "^${setting}:" pnpm-workspace.yaml; then
              echo "::error::Missing required security setting: ${setting} in pnpm-workspace.yaml"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Add the missing settings to pnpm-workspace.yaml. See Phase 23 docs."
            exit 1
          fi
          echo "All supply chain settings present"
      - name: Audit dependencies
        run: pnpm audit --audit-level high

  ci-pass:
    if: always()
    needs: [lint, typecheck, test-tz-sa, test-tz-de, build, data-integrity, e2e, supply-chain]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.test-tz-sa.result }}" != "success" ||
                "${{ needs.test-tz-de.result }}" != "success" ||
                "${{ needs.build.result }}" != "success" ||
                "${{ needs.data-integrity.result }}" != "success" ||
                "${{ needs.e2e.result }}" != "success" ||
                "${{ needs.supply-chain.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed or were cancelled"
            exit 1
          fi
