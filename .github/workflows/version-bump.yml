name: Version Bump

on:
  push:
    branches: [main]

jobs:
  bump-version:
    # Skip if the commit was made by this action or contains [skip version]
    if: |
      !contains(github.event.head_commit.message, '[skip version]') &&
      github.event.head_commit.author.name != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Determine bump level
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qi '\[major\]'; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qi '\[minor\]'; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        run: npm version ${{ steps.bump.outputs.level }} --no-git-tag-version

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: bump version to ${VERSION} [skip version]"
          git push
