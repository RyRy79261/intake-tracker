onlyBuiltDependencies:
  - '@reown/appkit'

# Supply chain security (Phase 23)
minimumReleaseAge: 1440
trustPolicy: no-downgrade
trustPolicyExclude:
  - eslint-import-resolver-typescript
  - jose
  - semver
  - tailwind-merge
  - undici-types
blockExoticSubdeps: true
auditLevel: high

# pnpm 10.30 does not read auditConfig from workspace config; use --ignore CLI flag in CI.
# Each entry below has a documented rationale — do not remove without verifying the advisory.
auditConfig:
  ignoreCves:
    # Next.js RSC deserialization DoS — only affects >=15.0.0 RSC usage.
    # This app uses Next.js 14 (no RSC). Patched version requires Next.js 15+ (major upgrade).
    - GHSA-h25m-26qc-wcjf
    # Rollup path traversal — unfixable, next-pwa uses rollup 1.x; override breaks build.
    - GHSA-mw96-cpmx-2vgc
    # minimatch ReDoS (3 advisories) — via eslint transitive dep, override not honored in lockfile.
    # pnpm overrides exist but incremental install does not re-resolve already-locked versions.
    - GHSA-3ppc-4f35-3m26
    - GHSA-7r86-cg39-jmmj
    - GHSA-23c5-xmqv-rm74
    # picomatch ReDoS — via tailwindcss>chokidar>anymatch, override not honored in lockfile.
    - GHSA-c2c7-rcm5-vvqj

# Transitive vulnerability overrides (Phase 23 - pnpm audit --fix)
overrides:
  '@isaacs/brace-expansion@<=5.0.0': '>=5.0.1'
  ajv@<6.14.0: '>=6.14.0'
  ajv@>=7.0.0-alpha.0 <8.18.0: '>=8.18.0'
  axios@>=1.0.0 <=1.13.4: '>=1.13.5'
  bn.js@>=5.0.0 <5.2.3: '>=5.2.3'
  brace-expansion@<1.1.13: '>=1.1.13'
  brace-expansion@>=2.0.0 <2.0.3: '>=2.0.3'
  flatted@<3.4.0: '>=3.4.0'
  flatted@<=3.4.1: '>=3.4.2'
  glob@>=10.2.0 <10.5.0: '>=10.5.0'
  h3@<1.15.6: '>=1.15.6'
  h3@<1.15.9: '>=1.15.9'
  h3@<=1.15.8: '>=1.15.9'
  hono@<4.11.10: '>=4.11.10'
  hono@<4.12.4: '>=4.12.4'
  hono@<4.12.7: '>=4.12.7'
  minimatch@<3.1.4: '>=3.1.4'
  minimatch@>=5.0.0 <5.1.8: '>=5.1.8'
  minimatch@>=9.0.0 <9.0.7: '>=9.0.7'
  minimatch@>=10.0.0 <10.2.3: '>=10.2.3'
  picomatch@<2.3.2: '>=2.3.2'
  picomatch@>=4.0.0 <4.0.4: '>=4.0.4'
  serialize-javascript@<7.0.5: '>=7.0.5'
  serialize-javascript@<=7.0.2: '>=7.0.3'
  socket.io-parser@>=4.0.0 <4.2.6: '>=4.2.6'
