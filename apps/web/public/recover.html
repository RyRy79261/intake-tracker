<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#f5f7fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
  <meta name="robots" content="noindex">
  <title>Reset · Intake Tracker</title>
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa; color: #1f2937;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #e5e7eb; }
    }
    main { max-width: 440px; width: 100%; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    p { line-height: 1.5; margin: 8px 0; }
    .muted { opacity: 0.7; font-size: 14px; }
    .row { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
    a.btn {
      display: inline-block; padding: 10px 16px;
      border: 1px solid rgba(127,127,127,0.4); border-radius: 8px;
      background: transparent; color: inherit;
      text-decoration: none; font: inherit; cursor: pointer;
    }
    a.btn.primary { background: #3b82f6; border-color: #3b82f6; color: white; }
    [hidden] { display: none !important; }
    .spinner {
      width: 18px; height: 18px;
      border: 3px solid rgba(127,127,127,0.2);
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: -3px; margin-right: 8px; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <h1><span class="spinner" id="spinner"></span>Resetting Intake Tracker</h1>
    <p id="status">Unregistering service worker and clearing caches…</p>
    <p class="muted">Your tracked data, settings, and account are not affected — this only clears cached app code.</p>
    <p class="muted" id="report" hidden></p>
    <div class="row">
      <a class="btn primary" id="continue" href="/" hidden>Open Intake Tracker</a>
      <a class="btn" id="retry" href="" hidden>Retry</a>
    </div>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var target = params.get('return') || '/';
      if (!target.startsWith('/') || target.startsWith('//')) target = '/';

      var status = document.getElementById('status');
      var report = document.getElementById('report');
      var cont = document.getElementById('continue');
      var spinner = document.getElementById('spinner');
      var retry = document.getElementById('retry');
      retry.href = location.pathname + location.search;

      function finish(parts, ok) {
        spinner.hidden = true;
        status.textContent = ok
          ? 'Done. Open the app to load a fresh copy.'
          : 'Something went wrong, but you can still try opening the app.';
        cont.href = target;
        cont.hidden = false;
        if (!ok) retry.hidden = false;
        if (parts.length) {
          report.hidden = false;
          report.textContent = parts.join(' · ');
        }
      }

      (async function () {
        var parts = [];
        var ok = true;
        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            for (var i = 0; i < regs.length; i++) {
              try { await regs[i].unregister(); } catch (e) {}
            }
            parts.push(regs.length + ' service worker' + (regs.length === 1 ? '' : 's') + ' unregistered');
          }
          if ('caches' in window) {
            var keys = await caches.keys();
            for (var j = 0; j < keys.length; j++) {
              try { await caches.delete(keys[j]); } catch (e) {}
            }
            parts.push(keys.length + ' cache' + (keys.length === 1 ? '' : 's') + ' cleared');
          }
          try { localStorage.removeItem('itrk:bootState'); } catch (e) {}
        } catch (e) {
          ok = false;
          parts.push('error: ' + (e && e.message || e));
        }
        finish(parts, ok);
      })();
    })();
  </script>
</body>
</html>
